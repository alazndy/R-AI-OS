# cargo-audit ignore list.
#
# AGENT_CONSTITUTION.md §4 ("Vulnerable and Outdated Components") requires
# `cargo audit` clean (no blocking vulnerabilities) before every commit.
# Every entry below is a documented, upstream-blocked exception — not a
# blanket suppression. Re-run `cargo audit` (no flags) after any dependency
# bump and remove an entry once a fix is actually available; don't add new
# entries here without the same investigation trail.
#
# Advisories NOT listed here (e.g. RUSTSEC-2025-0119 `number_prefix`,
# RUSTSEC-2024-0436 `paste`, RUSTSEC-2026-0002 `lru`) are left visible on
# purpose: they're "unmaintained"/"unsound" warnings that `cargo audit`
# already treats as non-blocking by default (only actual vulnerabilities
# fail the run), and hiding them here would bury a signal worth re-checking
# on the next dependency bump for no benefit.

[advisories]
ignore = [
    # quick-xml <0.41 (RUSTSEC-2026-0194 quadratic parse time,
    # RUSTSEC-2026-0195 unbounded namespace-declaration allocation — both
    # DoS-only). Reached only via notify-rust -> tauri-winrt-notification
    # 0.7.2 (Windows-only toast-notification backend), which pins
    # `quick-xml = "^0.37"`. Verified 2026-07-02:
    # `cargo update -p quick-xml --precise 0.41.0` fails outright — no
    # compatible quick-xml exists within tauri-winrt-notification 0.7.2's
    # own manifest constraint, so this can't be fixed from this repo alone.
    # Not attacker-reachable in this codebase's actual usage: quick-xml
    # here only serializes developer-authored notification text into a
    # WinRT toast, never parses untrusted/attacker-supplied XML. Re-check
    # when notify-rust bumps its `winrt-notification` dependency to a
    # release that pins quick-xml >=0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]
