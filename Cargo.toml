[package]
name = "r-ai-os"
version = "0.1.0"
edition = "2021"
authors = ["alazndy <goktugturhan74@gmail.com>"]
description = "AI OS Terminal Control Center — Rust Edition"
license = "MIT"

[[bin]]
name = "raios"
path = "src/main.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
walkdir = "2"
dirs = "5"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
