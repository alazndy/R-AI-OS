[package]
name = "r-ai-os"
version = "0.2.8"
edition = "2021"
authors = ["alazndy <goktugturhan74@gmail.com>"]
description = "AI OS Terminal Control Center — Rust Edition"
license = "MIT"

[[bin]]
name = "raios"
path = "src/main.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
walkdir = "2"
dirs = "5"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
